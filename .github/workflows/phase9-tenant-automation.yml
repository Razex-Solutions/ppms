name: Phase 9 Backend And Contract Automation

on:
  push:
    branches:
      - developments
  pull_request:
    branches:
      - developments

jobs:
  phase9:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Prepare database
        shell: pwsh
        run: |
          alembic upgrade head

      - name: Run backend unit tests
        shell: pwsh
        run: |
          python -m pytest tests

      - name: Start backend
        shell: pwsh
        run: |
          Start-Process -FilePath python -ArgumentList "run_local_server.py" -WorkingDirectory $PWD
          $deadline = (Get-Date).AddSeconds(45)
          do {
            try {
              $health = Invoke-RestMethod -Uri "http://127.0.0.1:8012/health" -TimeoutSec 2
              if ($health.status -eq "ok") {
                Write-Host "Backend is healthy."
                exit 0
              }
            } catch {
              Start-Sleep -Seconds 2
            }
          } while ((Get-Date) -lt $deadline)
          throw "Backend did not become healthy in time."

      - name: Run Phase 9 business scenario
        shell: pwsh
        run: |
          .\run_phase9_scenario.ps1

      - name: Run tenant UI API smoke
        shell: pwsh
        run: |
          .\run_phase9_tenant_ui_api_smoke.ps1

      - name: Flutter note
        shell: pwsh
        run: |
          Write-Host "Flutter app folders were intentionally removed. Matrix and API smoke automation stay in place for the future rebuild."
